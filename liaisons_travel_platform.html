function setErr(msg){var el=document.getElementById('loginErr');if(el)el.textContent=msg;}

function loadMSAL(){
  var s=document.createElement('script');
  s.src='https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js';
  s.crossOrigin='anonymous';
  s.onload=function(){initMSAL();};
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.1/lib/msal-browser.min.js';
    s2.crossOrigin='anonymous';
    s2.onload=function(){initMSAL();};
    s2.onerror=function(){setErr('Could not load Microsoft auth.');};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

function initMSAL(){
  var config={auth:{clientId:SP_CLIENT_ID,authority:'https://login.microsoftonline.com/'+SP_TENANT,redirectUri:REDIRECT_URI,navigateToLoginRequestUrl:true},cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:true}};
  msalInstance=new msal.PublicClientApplication(config);
  msalInstance.handleRedirectPromise().then(function(r){
    if(r){currentAccount=r.account;spToken=r.accessToken;onSignedIn();}
    else{var accounts=msalInstance.getAllAccounts();if(accounts.length>0){currentAccount=accounts[0];getToken().then(function(){onSignedIn();}).catch(function(){showLogin();});}else{showLogin();}}
  }).catch(function(e){console.error(e);showLogin();});
}

function showLogin(){document.getElementById('sLogin').style.display='flex';setErr('');}
function signIn(){if(!msalInstance){setErr('Auth loading...');return;}setErr('Redirecting...');msalInstance.loginRedirect({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All']});}
function signOut(){if(msalInstance&&currentAccount){msalInstance.logoutRedirect({account:currentAccount});}else{showLogin();}}

function getToken(){
  if(!msalInstance||!currentAccount)return Promise.reject('Not signed in');
  return msalInstance.acquireTokenSilent({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All'],account:currentAccount})
    .then(function(r){spToken=r.accessToken;return spToken;})
    .catch(function(){return msalInstance.acquireTokenRedirect({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All'],account:currentAccount});});
}

function onSignedIn(){
  document.getElementById('sLogin').style.display='none';
  buildApp();
  setInterval(function(){getToken().catch(function(){setSyncStatus('Session expired - please refresh');});},45*60*1000);
  loadAll();
}

// SHAREPOINT
function spGet(url){return getToken().then(function(t){return fetch(url,{headers:{Authorization:'Bearer '+t}});}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}
function spPost(url,body){return getToken().then(function(t){return fetch(url,{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)});}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error('POST '+r.status+': '+e);});return r.json();});}
function spPatch(url,body){return getToken().then(function(t){return fetch(url,{method:'PATCH',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json','If-Match':'*'},body:JSON.stringify(body)});}).then(function(r){if(!r.ok)return r.text().then(function(e){throw new Error('PATCH '+r.status+': '+e);});return r;});}
function spDel(url){return getToken().then(function(t){return fetch(url,{method:'DELETE',headers:{Authorization:'Bearer '+t,'If-Match':'*'}});});}

function loadAll(){
  setSyncStatus('Loading...');
  var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
  spGet(url).then(function(data){
    trips={};onePagers={};
    var items=data.value||[];
    for(var i=0;i<items.length;i++){
      var item=items[i];var f=item.fields;if(!f)continue;
      var d={};
      try{d=JSON.parse(f.TripData||'{}');}catch(e){continue;}
      d._spId=item.id;
      var key=d.code||item.id;
      if(d.docType==='onepager'){onePagers[key]=d;}
      else{trips[key]=d;}
    }
    setSyncStatus('Synced '+new Date().toLocaleTimeString());
    renderDash();renderOnePagers();
  }).catch(function(e){setSyncStatus('Sync failed: '+e.message);console.error(e);renderDash();renderOnePagers();});
}

function spSave(doc){
  var fields={Title:doc.name||doc.destination||'Untitled',TripCode:doc.code||'',TripData:JSON.stringify(doc)};
  if(doc._spId){return spPatch(LIST_URL+'/items/'+doc._spId,{fields:fields});}
  else{return spPost(LIST_URL+'/items',{fields:fields}).then(function(d){if(d&&d.id)doc._spId=d.id;return d;});}
}

function spDelDoc(doc){if(!doc._spId)return Promise.resolve();return spDel(LIST_URL+'/items/'+doc._spId);}
function setSyncStatus(msg){var el=document.getElementById('syncStatus');if(el)el.textContent=msg;}
function setSaveStatus(msg){var el=document.getElementById('saveStatus');if(el)el.textContent=msg;}
function setOpSaveStatus(msg){var el=document.getElementById('opSaveStatus');if(el)el.textContent=msg;}

    code:code,
    dates:document.getElementById('opDates').value,
    intro:document.getElementById('opIntro').value,
    footerNote:document.getElementById('opFooterNote').value,
    images:opImages,
    bullets:opBullets
  };
  var existingKey=curOpId;
  if(existingKey&&onePagers[existingKey]&&onePagers[existingKey]._spId)op._spId=onePagers[existingKey]._spId;
  if(existingKey&&existingKey!==code&&onePagers[existingKey])delete onePagers[existingKey];
  onePagers[code]=op;curOpId=code;
  setOpSaveStatus('Saving...');
  document.getElementById('saveOpBtn').disabled=true;
  spSave(op).then(function(){
    setOpSaveStatus('Saved!');setSyncStatus('Synced '+new Date().toLocaleTimeString());
    setTimeout(function(){setOpSaveStatus('');},3000);
    document.getElementById('saveOpBtn').disabled=false;
    renderOnePagers();
  }).catch(function(e){setOpSaveStatus('Save failed: '+e.message);document.getElementById('saveOpBtn').disabled=false;console.error(e);});
}

function deleteOnePager(){
  if(!curOpId||!confirm('Delete this one pager?'))return;
  var op=onePagers[curOpId];delete onePagers[curOpId];closeOpEditor();renderOnePagers();
  if(op)spDelDoc(op).catch(function(e){console.error(e);});
}

function publishOnePager(id){
  var op=onePagers[id];if(!op){alert('Not found.');return;}
  var token=localStorage.getItem('gh_token');
  if(!token){alert('Add your GitHub token in Settings first.');openSettings();return;}
  var owner=localStorage.getItem('gh_owner')||'jessicahz10-hash';
  var repo=localStorage.getItem('gh_repo')||'liaisonstravel';
  var domain=localStorage.getItem('gh_domain')||'trips.liaisonstravel.com';
  var code=op.code||'destination';
  var filename='destinations/'+code+'.html';
  var html=buildOnePagerHTML(op);
  var b64=btoa(unescape(encodeURIComponent(html)));
  var apiUrl='https://api.github.com/repos/'+owner+'/'+repo+'/contents/'+filename;
  setSyncStatus('Publishing...');
  fetch(apiUrl,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.ok?r.json():null;})
  .then(function(existing){
    var body={message:'Publish one pager: '+code,content:b64};
    if(existing&&existing.sha)body.sha=existing.sha;
    return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
  })
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r.json();})
  .then(function(){
    var link='https://'+domain+'/destinations/'+code+'.html';
    setSyncStatus('Published!');setTimeout(function(){setSyncStatus('');},3000);
    if(navigator.clipboard){navigator.clipboard.writeText(link).then(function(){alert('✅ Published!\n\nLink copied:\n'+link);});}
    else{prompt('Published! Link:',link);}
  })
  .catch(function(e){setSyncStatus('Publish failed');console.error(e);alert('Publish failed: '+e.message);});
}

// BUILD ONE PAGER HTML
function buildOnePagerHTML(op){
  var imgsHTML='';
  if(op.images&&op.images.length){
    if(op.images.length===1){
      imgsHTML='<div style="margin:32px 0"><img src="'+op.images[0].data+'" style="width:100%;max-height:480px;object-fit:cover;display:block" alt="'+(op.images[0].caption||'')+'"/>'+(op.images[0].caption?'<p style="font-size:11px;color:#808080;margin-top:6px;font-style:italic">'+op.images[0].caption+'</p>':'')+' </div>';
    } else if(op.images.length<=3){
      imgsHTML='<div style="display:grid;grid-template-columns:repeat('+op.images.length+',1fr);gap:8px;margin:32px 0">';
      for(var i=0;i<op.images.length;i++){imgsHTML+='<div><img src="'+op.images[i].data+'" style="width:100%;height:280px;object-fit:cover;display:block" alt="'+(op.images[i].caption||'')+'"/>'+(op.images[i].caption?'<p style="font-size:10px;color:#808080;margin-top:4px;font-style:italic">'+op.images[i].caption+'</p>':'')+'</div>';}
      imgsHTML+='</div>';
    } else {
      imgsHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin:32px 0">';
      for(var i=0;i<op.images.length;i++){imgsHTML+='<div><img src="'+op.images[i].data+'" style="width:100%;height:240px;object-fit:cover;display:block" alt="'+(op.images[i].caption||'')+'"/>'+(op.images[i].caption?'<p style="font-size:10px;color:#808080;margin-top:4px;font-style:italic">'+op.images[i].caption+'</p>':'')+'</div>';}
      imgsHTML+='</div>';
    }
  }
  var bulletsHTML='';
  if(op.bullets&&op.bullets.length){
    bulletsHTML='<div style="margin:28px 0"><p style="font-size:11px;font-weight:600;margin-bottom:14px;letter-spacing:.05em">Highlights:</p>';
    for(var i=0;i<op.bullets.length;i++){if(op.bullets[i].trim())bulletsHTML+='<p style="font-size:14px;line-height:1.7;margin-bottom:8px;padding-left:16px;text-indent:-16px">&bull;&nbsp;'+op.bullets[i]+'</p>';}
    bulletsHTML+='</div>';
  }
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>'+

// TRIP EDITOR (existing)
function openEditor(id){
  curId=id;var t=id?trips[id]:{};
  document.getElementById('edTitle').textContent=id?'Edit Trip':'New Trip';
  document.getElementById('fName').value=t.name||'';
  document.getElementById('fCode').value=t.code||'';
  document.getElementById('fDest').value=t.destinations||'';
  document.getElementById('fDates').value=t.dates||'';
  document.getElementById('fStatus').value=t.status||'draft';
  document.getElementById('fPM').value=t.assignedPM||'';
  document.getElementById('fClient').value=t.clientName||'';
  document.getElementById('fWelcome').value=t.welcome||'';
  document.getElementById('fPhone').value=t.contactPhone||'';
  document.getElementById('edDeleteBtn').style.display=id?'block':'none';
  eHero=t.heroImg||null;eLogo=t.clientLogo||null;
  eBoxStyle=t.boxStyle||'frosted-white';eBoxOpacity=t.boxOpacity||'0.15';eBrandColor=t.brandColor||'#5B2D8E';
  var bsEl=document.getElementById('fBoxStyle');if(bsEl)bsEl.value=eBoxStyle;
  var boEl=document.getElementById('fBoxOpacity');if(boEl)boEl.value=eBoxOpacity;
  var bcEl=document.getElementById('fBrandColor');if(bcEl)bcEl.value=eBrandColor;
  showImgPrev('heroPrev',eHero);showImgPrev('logoPrev',eLogo);
  eDays=t.days?JSON.parse(JSON.stringify(t.days)):[];
  ePack=t.packing?JSON.parse(JSON.stringify(t.packing)):[];
  eInfo=t.info?JSON.parse(JSON.stringify(t.info)):[];
  eDocs=t.docs?JSON.parse(JSON.stringify(t.docs)):[];
  eCity=t.cityGuide?JSON.parse(JSON.stringify(t.cityGuide)):[];
  eCityPdf=t.cityPdf||null;
  showCityPdfPrev();
  renderDays();renderPack();renderInfo();renderDocs();renderCity();
  setSaveStatus('');switchTab('tSetup');
  hasUnsavedChanges=false;clearTimeout(autoSaveTimer);
  document.getElementById('editorModal').classList.add('open');
}

function closeEditor(){
  if(hasUnsavedChanges){if(!confirm('You have unsaved changes. Close anyway?'))return;}
  clearTimeout(autoSaveTimer);hasUnsavedChanges=false;
  document.getElementById('editorModal').classList.remove('open');
}

function markDirty(){
  hasUnsavedChanges=true;setSaveStatus('Unsaved changes...');
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){
    var name=document.getElementById('fName').value.trim();
    var code=document.getElementById('fCode').value.trim();
    if(name&&code)saveTrip(true);
  },5000);
}

function switchTab(id){
  document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');if(t.getAttribute('data-tab')===id)t.classList.add('active');});
  var panel=document.getElementById(id);if(panel)panel.classList.add('active');
}

function updateShare(code){
  var sl=document.getElementById('shareLink');if(sl)sl.value=REDIRECT_URI+'#trip/'+(code||'');
  var sc=document.getElementById('shareCode');if(sc)sc.textContent=code||'(save trip first)';
}

function saveTrip(auto){
  var name=document.getElementById('fName').value.trim();
  var code=document.getElementById('fCode').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name||!code){if(!auto)alert('Trip Name and Trip Code are required.');return;}
  if(!curId){var keys=Object.keys(trips);for(var i=0;i<keys.length;i++){if(trips[keys[i]].code===code){if(!confirm('A trip with code "'+code+'" already exists. Overwrite it?'))return;break;}}}
  function gv(id,def){var el=document.getElementById(id);return el?el.value:(def||'');}
  var trip={
    name:name,code:code,
    destinations:gv('fDest'),dates:gv('fDates'),status:gv('fStatus','draft'),assignedPM:gv('fPM'),
    heroImg:eHero,
    boxStyle:(function(){var el=document.getElementById('fBoxStyle');if(el)eBoxStyle=el.value;return eBoxStyle;})(),
    boxOpacity:(function(){var el=document.getElementById('fBoxOpacity');if(el)eBoxOpacity=el.value;return eBoxOpacity;})(),
    brandColor:(function(){var el=document.getElementById('fBrandColor');if(el)eBrandColor=el.value;return eBrandColor;})(),
    clientName:gv('fClient'),clientLogo:eLogo,welcome:gv('fWelcome'),contactPhone:gv('fPhone'),
    days:eDays,packing:ePack,info:eInfo,docs:eDocs,cityGuide:eCity,cityPdf:eCityPdf
  };
  var existingKey=curId;
  if(existingKey&&trips[existingKey]&&trips[existingKey]._spId)trip._spId=trips[existingKey]._spId;
  if(existingKey&&existingKey!==code&&trips[existingKey])delete trips[existingKey];
  trips[code]=trip;curId=code;
  setSaveStatus('Saving...');document.getElementById('saveTripBtn').disabled=true;
  spSave(trip).then(function(){
    hasUnsavedChanges=false;clearTimeout(autoSaveTimer);
    setSaveStatus(auto?'Auto-saved ✓':'Saved!');setSyncStatus('Synced '+new Date().toLocaleTimeString());
    setTimeout(function(){setSaveStatus('');},3000);
    document.getElementById('saveTripBtn').disabled=false;renderDash();
  }).catch(function(e){setSaveStatus('Save failed: '+e.message);document.getElementById('saveTripBtn').disabled=false;console.error(e);});
}

function deleteTrip(){
  if(!curId||!confirm('Delete this trip?'))return;
  var trip=trips[curId];delete trips[curId];closeEditor();renderDash();
  if(trip)spDelDoc(trip).catch(function(e){console.error(e);});
}

function showImgPrev(cid,data){var c=document.getElementById(cid);if(!c)return;c.innerHTML=data?'<div class="uprev"><img src="'+data+'" alt=""/><button class="uclear" data-clear="'+cid+'">Remove</button></div>':'';}
function handleImgFile(file,type){var r=new FileReader();r.onload=function(ev){if(type==='hero'){eHero=ev.target.result;showImgPrev('heroPrev',eHero);}else{eLogo=ev.target.result;showImgPrev('logoPrev',eLogo);}};r.readAsDataURL(file);}

document.addEventListener('click',function(e){
  var b=e.target.closest('[data-clear]');if(b){var cid=b.getAttribute('data-clear');if(cid==='heroPrev')eHero=null;else eLogo=null;showImgPrev(cid,null);}
  var rmopimg=e.target.closest('[data-rmopimg]');if(rmopimg){opImages.splice(parseInt(rmopimg.getAttribute('data-rmopimg')),1);renderOpImages();}
  var rmopbullet=e.target.closest('[data-rmopbullet]');if(rmopbullet){opBullets.splice(parseInt(rmopbullet.getAttribute('data-rmopbullet')),1);renderOpBullets();}
});

document.addEventListener('input',function(e){
  var cap=e.target.getAttribute('data-opimgcap');if(cap!==null){opImages[parseInt(cap)].caption=e.target.value;}
  var bul=e.target.getAttribute('data-opbullet');if(bul!==null){opBullets[parseInt(bul)]=e.target.value;}
});

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]');
  if(!btn)return;
  var a=btn.getAttribute('data-action'),id=btn.getAttribute('data-id');
  if(a==='edit'){openEditor(id);}
  else if(a==='mobile'){var trip=trips[id];if(trip){document.getElementById('prevFrame').srcdoc=buildTravelerHTML(trip);document.getElementById('prevOverlay').classList.add('open');}}
  else if(a==='desktop'){var trip=trips[id];if(trip){document.getElementById('deskUrlBar').textContent='liaisonstravel.com/trip/'+(trip.code||'');document.getElementById('deskFrame').srcdoc=buildTravelerHTML(trip);document.getElementById('deskOverlay').classList.add('open');}}
  else if(a==='publish'){publishTrip(id);}
});

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-opaction]');
  if(!btn)return;
  var a=btn.getAttribute('data-opaction'),id=btn.getAttribute('data-id');
  if(a==='edit'){openOpEditor(id);}
  else if(a==='preview'){var op=onePagers[id];if(op){document.getElementById('deskUrlBar').textContent='destinations/'+(op.code||'');document.getElementById('deskFrame').srcdoc=buildOnePagerHTML(op);document.getElementById('deskOverlay').classList.add('open');}}
  else if(a==='publish'){publishOnePager(id);}
});

document.addEventListener('click',function(e){
  var fb=e.target.closest('.fbtn');
  if(!fb||!document.getElementById('filterBar'))return;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  fb.classList.add('active');currentFilter=fb.getAttribute('data-filter');renderDash();
});

function renderDays(){
  var c=document.getElementById('daysC');if(!c)return;c.innerHTML='';
  for(var di=0;di<eDays.length;di++){
    (function(di){var d=eDays[di];var el=document.createElement('div');el.className='di';
      el.innerHTML='<div class="dih" data-toggle="'+di+'"><h4>Day '+(di+1)+' - '+(d.title||'Untitled')+'</h4><button class="rb" data-rmday="'+di+'">&times;</button></div>'+
        '<div class="dib" id="db'+di+'"><div class="fr">'+
        '<div class="fg"><label class="fl">Title</label><input class="fi" value="'+esc(d.title||'')+'" data-df="'+di+'-title"/></div>'+
        '<div class="fg"><label class="fl">Date</label><input class="fi" value="'+esc(d.date||'')+'" data-df="'+di+'-date"/></div></div>'+
        '<label class="fl">Activities</label><div id="ac'+di+'"></div>'+
        '<button class="addbtn" data-addact="'+di+'">+ Add Activity</button></div>';
      c.appendChild(el);renderActs(di);
    })(di);
  }
}

document.addEventListener('click',function(e){
  var tog=e.target.closest('[data-toggle]');if(tog){var db=document.getElementById('db'+tog.getAttribute('data-toggle'));if(db)db.classList.toggle('open');return;}
  var rmd=e.target.closest('[data-rmday]');if(rmd){eDays.splice(parseInt(rmd.getAttribute('data-rmday')),1);renderDays();return;}
  var aa=e.target.closest('[data-addact]');if(aa){addAct(parseInt(aa.getAttribute('data-addact')));return;}
  var rma=e.target.closest('[data-rmact]');if(rma){var p=rma.getAttribute('data-rmact').split('-');eDays[p[0]].activities.splice(p[1],1);renderActs(parseInt(p[0]));return;}
  var rmpack=e.target.closest('[data-rmpack]');if(rmpack){ePack.splice(parseInt(rmpack.getAttribute('data-rmpack')),1);renderPack();return;}
  var rminfo=e.target.closest('[data-rminfo]');if(rminfo){eInfo.splice(parseInt(rminfo.getAttribute('data-rminfo')),1);renderInfo();return;}
  var rmdoc=e.target.closest('[data-rmdoc]');if(rmdoc){eDocs.splice(parseInt(rmdoc.getAttribute('data-rmdoc')),1);renderDocs();return;}
  var rmap=e.target.closest('[data-rmap]');if(rmap){var p=rmap.getAttribute('data-rmap').split('-');eDays[p[0]].activities[p[1]].photo=null;renderActs(parseInt(p[0]));return;}
});

document.addEventListener('change',function(e){
  var df=e.target.getAttribute('data-df');if(df){var p=df.split('-');eDays[p[0]][p[1]]=e.target.value;renderDays();markDirty();return;}
  var af=e.target.getAttribute('data-af');if(af){var p=af.split('-');eDays[p[0]].activities[p[1]][p[2]]=e.target.value;markDirty();return;}
  var pf=e.target.getAttribute('data-pf');if(pf){var p=pf.split('-');ePack[p[0]][p[1]]=e.target.value;markDirty();return;}
  var inf=e.target.getAttribute('data-inf');if(inf){var p=inf.split('-');eInfo[p[0]][p[1]]=e.target.value;markDirty();return;}
  var dcf=e.target.getAttribute('data-dcf');if(dcf){var p=dcf.split('-');eDocs[p[0]][p[1]]=e.target.value;markDirty();return;}
  if(e.target.id==='heroInput'&&e.target.files[0]){handleImgFile(e.target.files[0],'hero');markDirty();}
  if(e.target.id==='logoInput'&&e.target.files[0]){handleImgFile(e.target.files[0],'logo');markDirty();}
  if(e.target.id==='cityPdfInput'&&e.target.files[0]){var f=e.target.files[0];var r=new FileReader();r.onload=function(ev){eCityPdf={name:f.name,data:ev.target.result};showCityPdfPrev();markDirty();};r.readAsDataURL(f);}
  if(e.target.id==='opImgInput'&&e.target.files.length){
    var files=Array.from(e.target.files);var pending=files.length;
    files.forEach(function(file){var r=new FileReader();r.onload=function(ev){opImages.push({data:ev.target.result,caption:''});pending--;if(pending===0)renderOpImages();};r.readAsDataURL(file);});
  }
  var ap=e.target.getAttribute('data-ap');
  if(ap&&e.target.files[0]){var p=ap.split('-');var f=e.target.files[0];var r=new FileReader();r.onload=(function(di,ai){return function(ev){eDays[di].activities[ai].photo=ev.target.result;renderActs(di);};})(parseInt(p[0]),parseInt(p[1]));r.readAsDataURL(f);}
});

function addAct(di){if(!eDays[di].activities)eDays[di].activities=[];eDays[di].activities.push({time:'',title:'',desc:'',mapQuery:'',photo:null});renderActs(di);}

function renderActs(di){
  var c=document.getElementById('ac'+di);if(!c)return;c.innerHTML='';
  var acts=eDays[di].activities||[];
  for(var ai=0;ai<acts.length;ai++){
    (function(ai){var a=acts[ai];var el=document.createElement('div');el.className='ab';
      el.innerHTML='<div class="abh"><h5>Activity '+(ai+1)+'</h5><button class="rb" data-rmact="'+di+'-'+ai+'">&times;</button></div>'+
        '<div class="ag"><div><label class="fl">Time</label><input class="fi" value="'+esc(a.time||'')+'" placeholder="09:00" data-af="'+di+'-'+ai+'-time"/></div>'+
        '<div><label class="fl">Name</label><input class="fi" value="'+esc(a.title||'')+'" data-af="'+di+'-'+ai+'-title"/></div></div>'+
        '<div class="fg"><label class="fl">Description</label><input class="fi" value="'+esc(a.desc||'')+'" data-af="'+di+'-'+ai+'-desc"/></div>'+
        '<div class="abot"><div class="fg"><label class="fl">Maps Location</label><input class="fi" value="'+esc(a.mapQuery||'')+'" placeholder="e.g. Senso-ji Temple Tokyo" data-af="'+di+'-'+ai+'-mapQuery"/></div>'+
        '<div class="fg"><label class="fl">Photo</label><div class="uz" style="padding:7px"><input type="file" accept="image/*" data-ap="'+di+'-'+ai+'"/><p style="font-size:9px">'+(a.photo?'Change':'Upload optional')+'</p></div>'+
        (a.photo?'<div class="uprev"><img src="'+a.photo+'" alt=""/><button class="uclear" data-rmap="'+di+'-'+ai+'">Remove</button></div>':'')+
        '</div></div>';
      c.appendChild(el);
    })(ai);
  }
}

function renderPack(){
  var list=document.getElementById('packList');if(!list)return;list.innerHTML='';
  for(var i=0;i<ePack.length;i++){
    (function(i){var li=document.createElement('li');li.className='pei';li.draggable=true;
      li.innerHTML='<span class="dh2">&#8597;</span><input class="pm" placeholder="e.g. Passport" value="'+esc(ePack[i].label||'')+'" data-pf="'+i+'-label"/>'+
        '<input class="pcat" placeholder="Category" value="'+esc(ePack[i].category||'')+'" data-pf="'+i+'-category"/>'+
        '<button class="rb" data-rmpack="'+i+'">&times;</button>';
      li.addEventListener('dragstart',function(e){dragSrc=i;li.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      li.addEventListener('dragend',function(){li.classList.remove('dragging');});
      li.addEventListener('dragover',function(e){e.preventDefault();li.classList.add('drag-over');});
      li.addEventListener('dragleave',function(){li.classList.remove('drag-over');});
      li.addEventListener('drop',function(e){e.preventDefault();li.classList.remove('drag-over');if(dragSrc===null||dragSrc===i)return;var m=ePack.splice(dragSrc,1)[0];ePack.splice(i,0,m);dragSrc=null;renderPack();markDirty();});
      list.appendChild(li);
    })(i);
  }
}

function renderInfo(){
  var c=document.getElementById('infoC');if(!c)return;c.innerHTML='';
  for(var i=0;i<eInfo.length;i++){
    (function(i){var el=document.createElement('div');el.className='ci';
      el.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:9px"><input class="fi" value="'+esc(eInfo[i].title||'')+'" placeholder="Section title" style="flex:1" data-inf="'+i+'-title"/><button class="rb" data-rminfo="'+i+'">&times;</button></div><textarea class="fta" data-inf="'+i+'-content">'+esc(eInfo[i].content||'')+'</textarea>';
      c.appendChild(el);
    })(i);
  }
}

function renderDocs(){
  var c=document.getElementById('docsC');if(!c)return;c.innerHTML='';
  for(var i=0;i<eDocs.length;i++){
    (function(i){var el=document.createElement('div');el.className='dei';
      if(eDocs[i].type==='pdf'){el.innerHTML='<span class="dtb pdf">PDF</span><span style="flex:1;font-size:12px">'+esc(eDocs[i].name||'')+'</span><input class="fi" style="width:150px;flex:none" value="'+esc(eDocs[i].label||'')+'" data-dcf="'+i+'-label"/><button class="rb" data-rmdoc="'+i+'">&times;</button>';}
      else{el.innerHTML='<span class="dtb link">LINK</span><input class="fi" style="flex:1" value="'+esc(eDocs[i].label||'')+'" placeholder="Label" data-dcf="'+i+'-label"/><input class="fi" style="width:190px;flex:none" value="'+esc(eDocs[i].url||'')+'" placeholder="https://..." data-dcf="'+i+'-url"/><button class="rb" data-rmdoc="'+i+'">&times;</button>';}
      c.appendChild(el);
    })(i);
  }

function addDocUpload(){
  var inp=document.createElement('input');inp.type='file';inp.accept='application/pdf';
  inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){eDocs.push({type:'pdf',name:f.name,label:f.name.replace('.pdf',''),data:ev.target.result});renderDocs();};r.readAsDataURL(f);};
  inp.click();
}

function renderCity(){var c=document.getElementById('cityC');if(c)c.innerHTML='';}

function showCityPdfPrev(){
  var c=document.getElementById('cityPdfPrev');var u=document.getElementById('cityPdfUpload');if(!c)return;
  if(eCityPdf){
    c.innerHTML='<div class="uprev" style="margin-bottom:12px"><span style="font-size:12px;color:var(--purple)">&#128196; '+esc(eCityPdf.name||'City Guide PDF')+'</span><button class="uclear" id="removeCityPdf">Remove</button></div>';
    if(u)u.style.display='none';
    var rb=document.getElementById('removeCityPdf');if(rb)rb.addEventListener('click',function(){eCityPdf=null;showCityPdfPrev();markDirty();});
  } else {c.innerHTML='';if(u)u.style.display='block';}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// TRAVELER HTML
function buildTravelerHTML(trip){
  var tabs=[],sections=[];
  function addSec(label,html){var idx=tabs.length;tabs.push(label);sections.push('<div class="sec'+(idx===0?' active':'')+'" id="s'+idx+'">'+html+'</div>');}
  if(trip.welcome)addSec('Welcome','<p class="sttl">Welcome</p><p style="font-size:15px;line-height:1.9;max-width:600px;white-space:pre-wrap">'+trip.welcome+'</p>');
  if(trip.days&&trip.days.length){
    var pills='';if(trip.days.length>1){pills='<div class="dpills">';for(var di=0;di<trip.days.length;di++){pills+='<div class="dpill'+(di===0?' active':'')+'" onclick="goDay('+di+',this)">Day '+(di+1)+'</div>';}pills+='</div>';}
    var body='<p class="sttl">Day by Day Itinerary</p>'+pills;
    for(var di=0;di<trip.days.length;di++){
      var d=trip.days[di];
      body+='<div class="dayb" id="day'+di+'"><div class="dayhd"><span class="dnum">'+String(di+1)+'</span><div><div class="dtit">'+(d.title||'Day '+(di+1))+'</div><div class="ddt">'+(d.date||'')+'</div></div></div>';
      var acts=d.activities||[];
      for(var ai=0;ai<acts.length;ai++){var a=acts[ai];body+='<div class="ac">'+(a.photo?'<img src="'+a.photo+'" style="width:100%;height:200px;object-fit:cover;display:block" alt=""/>':'')+'<div class="acb">'+(a.time?'<div class="atm">'+a.time+'</div>':'')+'<div class="atl">'+(a.title||'')+'</div>'+(a.desc?'<div class="ads">'+a.desc+'</div>':'')+(a.mapQuery?'<a class="mbt" href="'+(a.mapQuery.indexOf("http")===0?a.mapQuery:"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a.mapQuery))+'" target="_blank">&#x1F4CD; View on Google Maps</a>':'')+'</div></div>';}
      body+='</div>';
    }
    addSec('Itinerary',body);
  }
  var packBody='<p class="sttl">Packing Checklist</p>';
  if(!trip.packing||!trip.packing.length){packBody+='<p style="font-size:13px;color:#B0B0B0;font-style:italic">Coming soon.</p>';}
  else{var bc={};for(var i=0;i<trip.packing.length;i++){var cat=trip.packing[i].category||'General';if(!bc[cat])bc[cat]=[];bc[cat].push(trip.packing[i].label);}var cats=Object.keys(bc);for(var ci=0;ci<cats.length;ci++){packBody+='<div style="margin-bottom:22px"><p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#808080;margin-bottom:9px">'+cats[ci]+'</p>';for(var ii=0;ii<bc[cats[ci]].length;ii++){packBody+='<div class="pi" onclick="this.classList.toggle(\'chk\')"><div class="pk"></div><span class="pkl">'+bc[cats[ci]][ii]+'</span></div>';}packBody+='</div>';}}
  addSec('Packing',packBody);
  var infoBody='<p class="sttl">General Information</p>';
  if(!trip.info||!trip.info.length){infoBody+='<p style="font-size:13px;color:#B0B0B0;font-style:italic">Coming soon.</p>';}
  else{for(var i=0;i<trip.info.length;i++){infoBody+='<div class="ic"><h4>'+(trip.info[i].title||'')+'</h4><p>'+(trip.info[i].content||'')+'</p></div>';}}
  addSec('General Info',infoBody);
  var docsBody='<p class="sttl">Documents</p>';
  if(!trip.docs||!trip.docs.length){docsBody+='<p style="font-size:13px;color:#B0B0B0;font-style:italic">Coming soon.</p>';}
  else{for(var i=0;i<trip.docs.length;i++){var doc=trip.docs[i];var href=doc.type==='pdf'?doc.data:doc.url||'#';docsBody+='<a class="dc" href="'+href+'" target="_blank"><div class="dico">'+(doc.type==='pdf'?'PDF':'LINK')+'</div><div><div style="font-size:13px;font-weight:400">'+(doc.label||doc.name||'Doc')+'</div><div style="font-size:10px;color:#B0B0B0">Tap to open</div></div><span style="color:#5B2D8E;margin-left:auto">&#8594;</span></a>';}}
  addSec('Documents',docsBody);
  var cityBody='<p class="sttl">City Guide</p>';
  if(trip.cityPdf&&trip.cityPdf.data){cityBody+='<a class="dc" href="'+trip.cityPdf.data+'" target="_blank" download="'+(trip.cityPdf.name||'city-guide.pdf')+'"><div class="dico">PDF</div><div><div style="font-size:13px;font-weight:400">'+(trip.cityPdf.name||'City Guide')+'</div><div style="font-size:10px;color:#B0B0B0">Tap to open</div></div><span style="color:var(--brand,#5B2D8E);margin-left:auto">&#8594;</span></a>';}
  else{cityBody+='<p style="font-size:13px;color:#B0B0B0;font-style:italic">Coming soon.</p>';}
  addSec('City Guide',cityBody);
  var brandColor=trip.brandColor||'#5B2D8E';
  var boxStyle=trip.boxStyle||'frosted-white';
  var boxOp=parseFloat(trip.boxOpacity)||0.15;
  var hboxBg=boxStyle==='none'?'background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;':boxStyle==='frosted-dark'?'background:rgba(0,0,0,'+boxOp+');backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);':'background:rgba(255,255,255,'+boxOp+');backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);';
  var navItems='';for(var i=0;i<tabs.length;i++){navItems+='<div class="ni'+(i===0?' active':'')+'" onclick="goTab('+i+',this)">'+tabs[i]+'</div>';}
  var clientBlock='';
  if(trip.clientLogo){clientBlock='<img src="'+trip.clientLogo+'" style="max-height:90px;max-width:220px;object-fit:contain;display:block;margin:0 auto 20px" alt=""/>';}
  else if(trip.clientName){clientBlock='<div style="color:#fff;font-size:12px;letter-spacing:.25em;text-transform:uppercase;font-weight:300;margin-bottom:18px;text-align:center;width:100%">'+trip.clientName+'</div>';}
  var phone=(trip.contactPhone||'').replace(/\s+/g,'');
  var contactBtn=phone?'<a href="https://wa.me/'+phone.replace(/\+/g,'')+'" target="_blank" style="position:fixed;bottom:24px;right:24px;z-index:999;background:#25D366;color:#fff;border-radius:50px;padding:12px 20px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2)">&#128172; Message Liaisons Team</a>':'';
  var daysJSON=JSON.stringify(trip.days||[]);
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>'+(trip.name||'My Trip')+'</title>'+

function renderTV(trip){

  document.getElementById('tvTitle').textContent=trip.name||'';
  document.getElementById('tvMeta').textContent=[trip.destinations,trip.dates].filter(Boolean).join(' — ');

function checkHash(){
  var h=window.location.hash;
  if(h.indexOf('#trip/')===0){
    var code=h.replace('#trip/','').toLowerCase();
    var keys=Object.keys(trips);
    for(var i=0;i<keys.length;i++){if(trips[keys[i]].code===code){renderTV(trips[keys[i]]);document.getElementById('sTraveler').style.display='block';return;}}
    var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
    fetch(url,{headers:{Authorization:'Bearer '+(spToken||'')}}).then(function(r){return r.json();}).then(function(data){
      var items=data.value||[];
      for(var i=0;i<items.length;i++){try{var t=JSON.parse(items[i].fields.TripData||'{}');if(t.code&&t.code.toLowerCase()===code){renderTV(t);document.getElementById('sTraveler').style.display='block';return;}}catch(e){}}
    }).catch(function(e){console.error('checkHash fetch error',e);});
  }
}

// AI
function setSt(m){var el=document.getElementById('aiSt');if(el)el.textContent=m;}
function fileToB64(f){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(f);});}
function handlePDF(f){
  if(!f)return;var apiKey=localStorage.getItem('anthropic_key');
  if(!apiKey){setSt('Add your Anthropic API key in Settings first.');openSettings();return;}
  setSt('Reading PDF...');
  fileToB64(f).then(function(b64){return callAI(null,b64,apiKey);}).catch(function(){setSt('Could not read PDF.');});
}
function callAI(text,pdfB64,apiKey){
  setSt('Analyzing with AI...');
  var sys='Return ONLY valid JSON, no markdown. Structure: {"tripName":"","destinations":"","dates":"","days":[{"title":"","date":"","activities":[{"time":"","title":"","desc":"","mapQuery":"venue+city","photo":null}]}]}';
  var msgs=[{role:'user',content:pdfB64?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},{type:'text',text:'Parse this PDF itinerary into the JSON structure.'}]:[{type:'text',text:'Parse this itinerary:\n\n'+text}]}];
  return fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:4000,system:sys,messages:msgs})})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){setSt('API error: '+data.error.message);return;}
    var raw='';var c=data.content||[];for(var i=0;i<c.length;i++){if(c[i].type==='text'){raw=c[i].text;break;}}
    raw=raw.replace(/```json/g,'').replace(/```/g,'').trim();
    var p=JSON.parse(raw);
    if(p.tripName&&!document.getElementById('fName').value){document.getElementById('fName').value=p.tripName;markDirty();}
    if(p.destinations&&!document.getElementById('fDest').value){document.getElementById('fDest').value=p.destinations;markDirty();}
    if(p.dates&&!document.getElementById('fDates').value){document.getElementById('fDates').value=p.dates;markDirty();}
    if(p.days&&p.days.length){eDays=eDays.concat(p.days);renderDays();switchTab('tItinerary');setSt('Done! '+p.days.length+' days added.');markDirty();}
    else setSt('No days found in PDF.');
  }).catch(function(err){setSt('Error parsing response.');console.error(err);});
}

// GITHUB PUBLISH (trips)
function publishTrip(id){
  var trip=trips[id];if(!trip){alert('Trip not found.');return;}
  if(trip.status==='draft'){if(!confirm('This trip is still a DRAFT. Publish anyway?'))return;}
  var token=localStorage.getItem('gh_token');
  if(!token){alert('Add your GitHub token in Settings first.');openSettings();return;}
  var owner=localStorage.getItem('gh_owner')||'jessicahz10-hash';
  var repo=localStorage.getItem('gh_repo')||'liaisonstravel';
  var folder=localStorage.getItem('gh_folder')||'trips';
  var customDomain=localStorage.getItem('gh_domain')||'trips.liaisonstravel.com';
  var code=trip.code||'trip';
  var filename=folder+'/'+code+'.html';
  var html=buildTravelerHTML(trip);
  var b64=btoa(unescape(encodeURIComponent(html)));
  var apiUrl='https://api.github.com/repos/'+owner+'/'+repo+'/contents/'+filename;
  setSyncStatus('Publishing...');
  fetch(apiUrl,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.ok?r.json():null;})
  .then(function(existing){var body={message:'Publish trip: '+(trip.name||code),content:b64};if(existing&&existing.sha)body.sha=existing.sha;return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r.json();})
  .then(function(){
    var clientLink='https://'+customDomain+'/trips/'+code+'.html';
    setSyncStatus('Published!');setTimeout(function(){setSyncStatus('');},3000);
    if(navigator.clipboard){navigator.clipboard.writeText(clientLink).then(function(){alert('✅ Published! Client link copied:\n\n'+clientLink);});}
    else{prompt('Published! Link:',clientLink);}
  })
  .catch(function(e){setSyncStatus('Publish failed');console.error(e);alert('Publish failed: '+e.message);});
}

function loadMSALpublic(code){
  var s=document.createElement('script');s.src='https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js';s.crossOrigin='anonymous';
  s.onload=function(){
    var config={auth:{clientId:SP_CLIENT_ID,authority:'https://login.microsoftonline.com/'+SP_TENANT,redirectUri:REDIRECT_URI},cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:true}};
    msalInstance=new msal.PublicClientApplication(config);
    msalInstance.handleRedirectPromise().then(function(r){
      if(r){spToken=r.accessToken;fetchPublicTrip(code);}
      else{var accts=msalInstance.getAllAccounts();if(accts.length>0){currentAccount=accts[0];getToken().then(function(){fetchPublicTrip(code);}).catch(function(){fetchPublicTrip(code);});}else{fetchPublicTrip(code);}}
    }).catch(function(){fetchPublicTrip(code);});
  };
  s.onerror=function(){fetchPublicTrip(code);};document.head.appendChild(s);
}

function fetchPublicTrip(code){
  var msg=document.getElementById('loadMsg');
  var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
  var hdrs={'Content-Type':'application/json'};if(spToken)hdrs['Authorization']='Bearer '+spToken;
  fetch(url,{headers:hdrs}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    var items=data.value||[];
    for(var i=0;i<items.length;i++){try{var t=JSON.parse(items[i].fields.TripData||'{}');if(t.code&&t.code.toLowerCase()===code){var loading=document.getElementById('tripLoading');if(loading)loading.style.display='none';renderTV(t);document.getElementById('sTraveler').style.display='block';return;}}catch(e){}}
    if(msg)msg.textContent='Trip not found.';
  }).catch(function(e){console.error(e);if(msg)msg.textContent='Could not load trip.';});
}
