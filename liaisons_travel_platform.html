function setErr(msg){var el=document.getElementById('loginErr');if(el)el.textContent=msg;}

function loadMSAL(){
  var s=document.createElement('script');
  s.src='https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js';
  s.crossOrigin='anonymous';
  s.onload=function(){initMSAL();};
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.1/lib/msal-browser.min.js';
    s2.crossOrigin='anonymous';
    s2.onload=function(){initMSAL();};
    s2.onerror=function(){setErr('Could not load Microsoft auth. Please check your internet connection.');};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

function initMSAL(){
  var config={
    auth:{
      clientId:SP_CLIENT_ID,
      authority:'https://login.microsoftonline.com/'+SP_TENANT,
      redirectUri:REDIRECT_URI,
      navigateToLoginRequestUrl:true
    },
    cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:true}
  };
  msalInstance=new msal.PublicClientApplication(config);
  msalInstance.handleRedirectPromise().then(function(r){
    if(r){currentAccount=r.account;spToken=r.accessToken;onSignedIn();}
    else{
      var accounts=msalInstance.getAllAccounts();
      if(accounts.length>0){currentAccount=accounts[0];getToken().then(function(){onSignedIn();}).catch(function(){showLogin();});}
      else{showLogin();}
    }
  }).catch(function(e){console.error(e);showLogin();});
}

function showLogin(){document.getElementById('sLogin').style.display='flex';setErr('');}
function signIn(){if(!msalInstance){setErr('Auth loading... please wait.');return;}setErr('Redirecting to Microsoft...');msalInstance.loginRedirect({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All']});}
function signOut(){if(msalInstance&&currentAccount){msalInstance.logoutRedirect({account:currentAccount});}else{showLogin();}}

function getToken(){
  if(!msalInstance||!currentAccount)return Promise.reject('Not signed in');
  return msalInstance.acquireTokenSilent({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All'],account:currentAccount})
    .then(function(r){spToken=r.accessToken;return spToken;})
    .catch(function(){return msalInstance.acquireTokenRedirect({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All'],account:currentAccount});});
}

function onSignedIn(){
  document.getElementById('sLogin').style.display='none';
  buildApp();
  // FIX 4: Refresh token every 45 min to prevent expiry
  setInterval(function(){
    getToken().catch(function(){
      setSyncStatus('Session expired - please refresh the page');
    });
  }, 45*60*1000);
  // Check hash BEFORE loading trips so traveler view works without auth
  var h=window.location.hash;
  if(h.indexOf('#trip/')===0){checkHash();}
  else{loadTrips();}
}

// SHAREPOINT
var GRAPH_BASE='https://graph.microsoft.com/v1.0';
// Use hostname:path format required by Graph API
var LIST_URL=GRAPH_BASE+'/sites/liaisonscorp.sharepoint.com:/sites/LiaisonsTravelApp:/lists/'+SP_LIST_ID;

function spGet(url){
  return getToken().then(function(token){
    return fetch(url,{headers:{Authorization:'Bearer '+token}});
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  });
}

function spPost(url,body){
  return getToken().then(function(token){
    return fetch(url,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error('POST '+r.status+': '+t);});
    return r.json();
  });
}

function spPatch(url,body){
  return getToken().then(function(token){
    return fetch(url,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json','If-Match':'*'},body:JSON.stringify(body)});
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error('PATCH '+r.status+': '+t);});
    return r;
  });
}

function spDel(url){
  return getToken().then(function(token){
    return fetch(url,{method:'DELETE',headers:{Authorization:'Bearer '+token,'If-Match':'*'}});
  });
}

function loadTrips(){
  setSyncStatus('Loading...');
  // FIX 1/2: Fetch all items, each item = one trip (TripData contains entire trip as JSON)
  var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
  spGet(url).then(function(data){
    trips={};
    var items=data.value||[];
    for(var i=0;i<items.length;i++){
      var item=items[i];
      var f=item.fields;
      if(!f)continue;
      var tripData={};
      try{tripData=JSON.parse(f.TripData||'{}');}catch(e){console.error('JSON parse error',e);continue;}
      // All data lives in TripData JSON
      var key=tripData.code||item.id;
      tripData._spId=item.id;
      trips[key]=tripData;
    }
    setSyncStatus('Synced '+new Date().toLocaleTimeString());
    renderDash();
  }).catch(function(e){
    setSyncStatus('Sync failed: '+e.message);
    console.error('loadTrips error',e);
    renderDash();
  });
}

// FIX 1/2: Save entire trip as ONE SharePoint list item
// TripData field holds full JSON. Strip base64 images from SharePoint fields to stay under 256KB limit.
function spSaveTrip(trip){
  // Build a lean copy for SharePoint storage - images stored inline in TripData but we keep field columns small
  var tripJSON=JSON.stringify(trip);
  // SharePoint text fields have a ~255 char limit for indexed columns but unlimited for multiline text (TripData must be Multiline)
  var fields={
    Title:trip.name||'Untitled',
    TripCode:trip.code||'',
    TripData:tripJSON
  };
  if(trip._spId){
    // UPDATE existing item
    return spPatch(LIST_URL+'/items/'+trip._spId,{fields:fields});
  } else {
    // CREATE new item - only ONE item per trip
    return spPost(LIST_URL+'/items',{fields:fields}).then(function(d){
      if(d&&d.id){trip._spId=d.id;}
      return d;
    });
  }
}

function spDelTrip(trip){if(!trip._spId)return Promise.resolve();return spDel(LIST_URL+'/items/'+trip._spId);}

function setSaveStatus(msg){var el=document.getElementById('saveStatus');if(el)el.textContent=msg;}

// auto=true means called by autosave timer (no alert on missing fields, no UI disruption)
function saveTrip(auto){
  var name=document.getElementById('fName').value.trim();
  var code=document.getElementById('fCode').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name||!code){if(!auto)alert('Trip Name and Trip Code are required.');return;}
  // FIX 5: Check for duplicate trip code (only on new trips)
  if(!curId){
    var keys=Object.keys(trips);
    for(var i=0;i<keys.length;i++){
      if(trips[keys[i]].code===code){
        if(!confirm('A trip with code "'+code+'" already exists. Overwrite it?'))return;
        break;
      }
    }
  }

  // Build complete trip object
  function gv(id,def){var el=document.getElementById(id);return el?el.value:(def||'');}
  var trip={
    name:name,
    code:code,
    destinations:gv('fDest'),
    dates:gv('fDates'),
    status:gv('fStatus','draft'),
    assignedPM:gv('fPM'),
    heroImg:eHero,
    boxStyle:(function(){var el=document.getElementById('fBoxStyle');if(el)eBoxStyle=el.value;return eBoxStyle;})(),
    boxOpacity:(function(){var el=document.getElementById('fBoxOpacity');if(el)eBoxOpacity=el.value;return eBoxOpacity;})(),
    brandColor:(function(){var el=document.getElementById('fBrandColor');if(el)eBrandColor=el.value;return eBrandColor;})(),
    clientName:gv('fClient'),
    clientLogo:eLogo,
    welcome:gv('fWelcome'),
    contactPhone:gv('fPhone'),
    days:eDays,
    packing:ePack,
    info:eInfo,
    docs:eDocs,
    cityGuide:eCity
  };

  // Preserve SP item ID if editing existing trip
  var existingKey=curId;
  if(existingKey&&trips[existingKey]&&trips[existingKey]._spId){
    trip._spId=trips[existingKey]._spId;
  }

  // Use trip code as local key
  var localKey=code;
  // If we renamed the code, remove old key
  if(existingKey&&existingKey!==localKey&&trips[existingKey]){
    delete trips[existingKey];
  }
  trips[localKey]=trip;
  curId=localKey;

  // FIX 2: Warn if TripData is too large (SharePoint multiline limit ~1MB safe threshold)
  var tripJSON=JSON.stringify(trip);
  if(tripJSON.length>800000){
    setSaveStatus('Warning: trip data is very large ('+Math.round(tripJSON.length/1024)+'KB). Consider removing some images.');
  }

  setSaveStatus('Saving...');
  document.getElementById('saveTripBtn').disabled=true;

  spSaveTrip(trip).then(function(){
    hasUnsavedChanges=false;
    clearTimeout(autoSaveTimer);
    setSaveStatus(auto?'Auto-saved ✓':'Saved!');
    setSyncStatus('Synced '+new Date().toLocaleTimeString());
    setTimeout(function(){setSaveStatus('');},3000);
    document.getElementById('saveTripBtn').disabled=false;
    renderDash();
    updateShare(code);
  }).catch(function(e){
    setSaveStatus('Save failed: '+e.message);
    document.getElementById('saveTripBtn').disabled=false;
    console.error('saveTrip error',e);
  });
}

function deleteTrip(){
  if(!curId||!confirm('Delete this trip? This cannot be undone.'))return;
  var trip=trips[curId];
  delete trips[curId];
  closeEditor();
  renderDash();
  if(trip)spDelTrip(trip).catch(function(e){console.error(e);});
}

  var dcf=e.target.getAttribute('data-dcf');

  if(cp&&e.target.files[0]){

function renderTV(trip){
  var bg=document.getElementById('tvBg');
  if(trip.heroImg){bg.src=trip.heroImg;bg.style.display='block';}else bg.style.display='none';
  document.getElementById('tvTitle').textContent=trip.name||'';
  document.getElementById('tvMeta').textContent=[trip.destinations,trip.dates].filter(Boolean).join(' — ');
  var cl=document.getElementById('tvClientLogo');
  if(trip.clientLogo){
    cl.innerHTML='<img src="'+trip.clientLogo+'" style="max-height:64px;max-width:180px;object-fit:contain;display:block;margin:0 auto" alt=""/>';
    cl.style.display='flex';
  } else if(trip.clientName){
    cl.innerHTML='<span style="color:#fff;font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:300;text-align:center">'+trip.clientName+'</span>';
    cl.style.display='flex';
  } else {
    cl.innerHTML='';cl.style.display='none';
  }
  var secs=document.getElementById('tvSecs');
  secs.innerHTML='<iframe src="about:blank" style="width:100%;height:100vh;border:none;display:block" sandbox="allow-scripts allow-same-origin allow-popups" id="tvFrame"></iframe>';
  document.getElementById('tvNav').innerHTML='';
  document.getElementById('tvFrame').srcdoc=buildTravelerHTML(trip);
}

function checkHash(){
  var h=window.location.hash;
  if(h.indexOf('#trip/')===0){
    var code=h.replace('#trip/','').toLowerCase();
    // Try local cache first
    var keys=Object.keys(trips);
    for(var i=0;i<keys.length;i++){
      if(trips[keys[i]].code===code){
        renderTV(trips[keys[i]]);
        document.getElementById('sTraveler').style.display='block';
        return;
      }
    }
    // Fetch from SP
    var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
    fetch(url,{headers:{Authorization:'Bearer '+(spToken||'')}})
      .then(function(r){return r.json();})
      .then(function(data){
        var items=data.value||[];
        for(var i=0;i<items.length;i++){
          try{
            var t=JSON.parse(items[i].fields.TripData||'{}');
            if(t.code&&t.code.toLowerCase()===code){
              renderTV(t);
              document.getElementById('sTraveler').style.display='block';
              return;
            }
          }catch(e){}
        }
      }).catch(function(e){console.error('checkHash fetch error',e);});
  }
}

// AI PDF PREFILL
function setSt(m){var el=document.getElementById('aiSt');if(el)el.textContent=m;}
function fileToB64(f){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(f);});}

function handlePDF(f){
  if(!f)return;
  var apiKey=localStorage.getItem('anthropic_key');
  if(!apiKey){setSt('Add your Anthropic API key in Settings first.');openSettings();return;}
  setSt('Reading PDF...');
  fileToB64(f).then(function(b64){return callAI(null,b64,apiKey);}).catch(function(){setSt('Could not read PDF.');});
}

function callAI(text,pdfB64,apiKey){
  setSt('Analyzing with AI...');
  var sys='Return ONLY valid JSON, no markdown. Structure: {"tripName":"","destinations":"","dates":"","days":[{"title":"","date":"","activities":[{"time":"","title":"","desc":"","mapQuery":"venue+city","photo":null}]}]}';
  var msgs=[{role:'user',content:pdfB64?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},{type:'text',text:'Parse this PDF itinerary into the JSON structure.'}]:[{type:'text',text:'Parse this itinerary:\n\n'+text}]}];
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:4000,system:sys,messages:msgs})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){setSt('API error: '+data.error.message);return;}
    var raw='';var c=data.content||[];for(var i=0;i<c.length;i++){if(c[i].type==='text'){raw=c[i].text;break;}}
    raw=raw.replace(/```json/g,'').replace(/```/g,'').trim();
    var p=JSON.parse(raw);
    if(p.tripName&&!document.getElementById('fName').value){document.getElementById('fName').value=p.tripName;markDirty();}
    if(p.destinations&&!document.getElementById('fDest').value){document.getElementById('fDest').value=p.destinations;markDirty();}
    if(p.dates&&!document.getElementById('fDates').value){document.getElementById('fDates').value=p.dates;markDirty();}
    if(p.days&&p.days.length){eDays=eDays.concat(p.days);renderDays();switchTab('tItinerary');setSt('Done! '+p.days.length+' days added.');markDirty();}
    else setSt('No days found in PDF.');
  }).catch(function(err){setSt('Error parsing response.');console.error(err);});
}

function publishTrip(id){
  var trip=trips[id];
  if(!trip){alert('Trip not found.');return;}
  if(trip.status==='draft'){
    if(!confirm('This trip is still a DRAFT. Publish anyway?'))return;
  }
  var token=localStorage.getItem('gh_token');
  if(!token){
    alert('Please add your GitHub token in Settings first.');
    openSettings();
    return;
  }
  var owner=localStorage.getItem('gh_owner')||'jessicahz10-hash';
  var repo=localStorage.getItem('gh_repo')||'liaisonstravel';
  var folder=localStorage.getItem('gh_folder')||'trips';
  var customDomain=localStorage.getItem('gh_domain')||'trips.liaisonstravel.com';
  var code=trip.code||'trip';
  var filename=folder+'/'+code+'.html';
  var html=buildTravelerHTML(trip);
  var b64=btoa(unescape(encodeURIComponent(html)));
  var apiUrl='https://api.github.com/repos/'+owner+'/'+repo+'/contents/'+filename;
  setSyncStatus('Publishing...');
  // Check if file exists to get SHA for update
  fetch(apiUrl,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
  .then(function(r){return r.ok?r.json():null;})
  .then(function(existing){
    var body={message:'Publish trip: '+(trip.name||code),content:b64};
    if(existing&&existing.sha)body.sha=existing.sha;
    return fetch(apiUrl,{
      method:'PUT',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify(body)
    });
  })
  .then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(t);});
    return r.json();
  })
  .then(function(){
    var clientLink='https://'+customDomain+'/trips/'+code+'.html';
    setSyncStatus('Published!');
    setTimeout(function(){setSyncStatus('');},3000);
    if(navigator.clipboard){
      navigator.clipboard.writeText(clientLink).then(function(){
        alert('✅ Published! Client link copied:\n\n'+clientLink+'\n\nSend this to your client — no login required!');
      });
    } else {
      prompt('✅ Published! Client link:',clientLink);
    }
  })
  .catch(function(e){
    setSyncStatus('Publish failed');
    console.error(e);
    alert('Publish failed: '+e.message+'\n\nCheck your GitHub token in Settings.');
  });
}

function loadMSALpublic(code){
  var s=document.createElement('script');
  s.src='https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js';
  s.crossOrigin='anonymous';
  s.onload=function(){
    var config={auth:{clientId:SP_CLIENT_ID,authority:'https://login.microsoftonline.com/'+SP_TENANT,redirectUri:REDIRECT_URI},cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:true}};
    msalInstance=new msal.PublicClientApplication(config);
    msalInstance.handleRedirectPromise().then(function(r){
      if(r){spToken=r.accessToken;fetchPublicTrip(code);}
      else{
        var accts=msalInstance.getAllAccounts();
        if(accts.length>0){currentAccount=accts[0];getToken().then(function(){fetchPublicTrip(code);}).catch(function(){fetchPublicTrip(code);});}
        else{fetchPublicTrip(code);}
      }
    }).catch(function(){fetchPublicTrip(code);});
  };
  s.onerror=function(){fetchPublicTrip(code);};
  document.head.appendChild(s);
}

function fetchPublicTrip(code){
  var msg=document.getElementById('loadMsg');
  var url=LIST_URL+'/items?$expand=fields($select=Title,TripCode,TripData)&$top=500';
  var hdrs={'Content-Type':'application/json'};
  if(spToken)hdrs['Authorization']='Bearer '+spToken;
  fetch(url,{headers:hdrs})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var items=data.value||[];
      for(var i=0;i<items.length;i++){
        try{
          var t=JSON.parse(items[i].fields.TripData||'{}');
          if(t.code&&t.code.toLowerCase()===code){
            var loading=document.getElementById('tripLoading');
            if(loading)loading.style.display='none';
            renderTV(t);
            document.getElementById('sTraveler').style.display='block';
            return;
          }
        }catch(e){}
      }
      if(msg)msg.textContent='Trip not found.';
    })
    .catch(function(e){console.error(e);if(msg)msg.textContent='Could not load trip.';});
}
</script>
