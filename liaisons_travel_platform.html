<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LIAISONS TRAVEL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;padding:56px 36px;max-width:400px;width:100%}
.sep{width:36px;height:1px;background:#5B2D8E;margin:10px auto 36px}
.err{color:#c0392b;font-size:12px;margin-top:12px;min-height:16px}
input{width:100%;border:none;border-bottom:1px solid #E0E0E0;padding:10px 0;font-size:15px;font-weight:300;outline:none;font-family:inherit;margin-bottom:4px}
input:focus{border-bottom-color:#5B2D8E}
button{background:#5B2D8E;color:#fff;border:none;padding:12px 32px;letter-spacing:.15em;text-transform:uppercase;font-size:11px;cursor:pointer;font-family:inherit;width:100%;margin-top:16px}
button:hover{background:#7B4DB0}
</style>
</head>
<body>
<div class="box">
  <svg viewBox="0 0 320 28" xmlns="http://www.w3.org/2000/svg" style="height:26px;width:auto;display:block;margin:0 auto">
    <text x="0" y="22" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="100" font-size="24" letter-spacing="5" fill="#5B2D8E">LIAISONS</text>
    <text x="158" y="22" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="100" font-size="24" letter-spacing="5" fill="#808080">TRAVEL</text>
  </svg>
  <p style="color:#B0B0B0;letter-spacing:.2em;font-size:10px;text-transform:uppercase;margin-top:8px">Trip Management Platform</p>
  <div class="sep"></div>
  <input type="password" id="pass" placeholder="Access code"/>
  <div class="err" id="err"></div>
  <button onclick="go()">Enter</button>
</div>
<script>
function go(){
  if(document.getElementById('pass').value==='liaisons2025'){
    alert('Login works! Now we rebuild the full app.');
  } else {
    document.getElementById('err').textContent='Incorrect access code.';
  }
}
document.getElementById('pass').addEventListener('keydown',function(e){
  if(e.key==='Enter')go();
});
</script>
</body>
</html>
